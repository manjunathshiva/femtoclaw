name: Build

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  idf-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [esp32, esp32s3]
    container:
      image: espressif/idf:v5.5.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build firmware (${{ matrix.target }})
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          idf.py set-target ${{ matrix.target }}
          idf.py fullclean
          idf.py build
