<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#bc8cff"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>
  <rect x="0" y="190" width="800" height="4" rx="2" fill="url(#accent)" opacity="0.6"/>
  <!-- Chip icon -->
  <rect x="50" y="55" width="90" height="90" rx="8" fill="none" stroke="#58a6ff" stroke-width="2"/>
  <rect x="65" y="70" width="60" height="60" rx="4" fill="#58a6ff" opacity="0.15"/>
  <text x="95" y="108" font-family="monospace" font-size="28" fill="#58a6ff" text-anchor="middle" font-weight="bold">AI</text>
  <!-- Pins -->
  <line x1="60" y1="45" x2="60" y2="55" stroke="#58a6ff" stroke-width="2"/>
  <line x1="80" y1="45" x2="80" y2="55" stroke="#58a6ff" stroke-width="2"/>
  <line x1="100" y1="45" x2="100" y2="55" stroke="#58a6ff" stroke-width="2"/>
  <line x1="120" y1="45" x2="120" y2="55" stroke="#58a6ff" stroke-width="2"/>
  <line x1="60" y1="145" x2="60" y2="155" stroke="#58a6ff" stroke-width="2"/>
  <line x1="80" y1="145" x2="80" y2="155" stroke="#58a6ff" stroke-width="2"/>
  <line x1="100" y1="145" x2="100" y2="155" stroke="#58a6ff" stroke-width="2"/>
  <line x1="120" y1="145" x2="120" y2="155" stroke="#58a6ff" stroke-width="2"/>
  <line x1="40" y1="75" x2="50" y2="75" stroke="#58a6ff" stroke-width="2"/>
  <line x1="40" y1="95" x2="50" y2="95" stroke="#58a6ff" stroke-width="2"/>
  <line x1="40" y1="115" x2="50" y2="115" stroke="#58a6ff" stroke-width="2"/>
  <line x1="140" y1="75" x2="150" y2="75" stroke="#58a6ff" stroke-width="2"/>
  <line x1="140" y1="95" x2="150" y2="95" stroke="#58a6ff" stroke-width="2"/>
  <line x1="140" y1="115" x2="150" y2="115" stroke="#58a6ff" stroke-width="2"/>
  <!-- Title -->
  <text x="200" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="48" fill="#e6edf3" font-weight="bold">FemtoClaw</text>
  <!-- Tagline -->
  <text x="200" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#8b949e">The world's smallest AI agent. $4 chip. ~120KB RAM. Pure C.</text>
  <!-- Badge -->
  <rect x="200" y="145" width="75" height="22" rx="11" fill="#238636" opacity="0.9"/>
  <text x="237" y="160" font-family="system-ui, sans-serif" font-size="11" fill="#fff" text-anchor="middle">ESP32</text>
  <rect x="285" y="145" width="85" height="22" rx="11" fill="#1f6feb" opacity="0.9"/>
  <text x="327" y="160" font-family="system-ui, sans-serif" font-size="11" fill="#fff" text-anchor="middle">ESP32-S3</text>
  <rect x="380" y="145" width="55" height="22" rx="11" fill="#8b949e" opacity="0.4"/>
  <text x="407" y="160" font-family="system-ui, sans-serif" font-size="11" fill="#e6edf3" text-anchor="middle">MIT</text>
</svg>
